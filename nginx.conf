server {
    listen 80;
    server_name _;

    root /var/www/basic-application/website;
    index index.html;

    # Static website
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — reverse proxy to the Node server on localhost.
    # The browser only ever talks to port 80; Node (3000) is never
    # exposed to the internet. Same origin, so no CORS needed.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
