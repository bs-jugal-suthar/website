<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake — Mini Game</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --accent: #22c55e;
      --accent-2: #4ade80;
      --food: #f43f5e;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      padding: 1rem;
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: 0.5px;
    }
    h1 span { color: var(--accent); }

    .scoreboard {
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: var(--muted);
    }
    .scoreboard b { color: var(--text); font-size: 1.2rem; }

    .stage {
      position: relative;
    }

    canvas {
      background: var(--panel);
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: rgba(15, 23, 42, 0.85);
      border-radius: 12px;
      text-align: center;
      padding: 1rem;
    }
    .overlay.hidden { display: none; }
    .overlay h2 { margin: 0; font-size: 1.5rem; }
    .overlay p { margin: 0; color: var(--muted); }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.4rem;
      font-size: 1rem;
      font-weight: 600;
      color: #052e16;
      background: var(--accent);
      transition: background 0.15s ease, transform 0.05s ease;
    }
    button:hover { background: var(--accent-2); }
    button:active { transform: translateY(1px); }

    .hint {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🐍 <span>Snake</span></h1>

  <div class="scoreboard">
    <div>Score: <b id="score">0</b></div>
    <div>Best: <b id="best">0</b></div>
  </div>

  <div class="stage">
    <canvas id="board" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="overlay-title">Snake</h2>
      <p id="overlay-text">Eat the food, don't hit the walls or yourself.</p>
      <button id="start-btn">Play</button>
    </div>
  </div>

  <p class="hint">Arrow keys / WASD to move · swipe on touch · P to pause</p>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');

    const GRID = 20;                 // 20x20 cells
    const CELL = canvas.width / GRID; // pixels per cell

    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayText = document.getElementById('overlay-text');
    const startBtn = document.getElementById('start-btn');

    let snake, dir, nextDir, food, score, speed, loop, running, paused;

    let best = Number(localStorage.getItem('snake-best') || 0);
    bestEl.textContent = best;

    function reset() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = dir;
      score = 0;
      speed = 120;
      scoreEl.textContent = score;
      placeFood();
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * GRID),
          y: Math.floor(Math.random() * GRID),
        };
      } while (snake.some(s => s.x === food.x && s.y === food.y));
    }

    function draw() {
      // background
      ctx.fillStyle = '#1e293b';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // food
      drawCell(food.x, food.y, '#f43f5e');

      // snake
      snake.forEach((seg, i) => {
        drawCell(seg.x, seg.y, i === 0 ? '#4ade80' : '#22c55e');
      });
    }

    function drawCell(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
    }

    function step() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // wall or self collision
      const hitWall = head.x < 0 || head.y < 0 || head.x >= GRID || head.y >= GRID;
      const hitSelf = snake.some(s => s.x === head.x && s.y === head.y);
      if (hitWall || hitSelf) return gameOver();

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score % 5 === 0 && speed > 60) {
          speed -= 10;
          restartLoop();
        }
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function restartLoop() {
      clearInterval(loop);
      loop = setInterval(step, speed);
    }

    function start() {
      reset();
      running = true;
      paused = false;
      overlay.classList.add('hidden');
      draw();
      restartLoop();
    }

    function gameOver() {
      clearInterval(loop);
      running = false;
      if (score > best) {
        best = score;
        localStorage.setItem('snake-best', best);
        bestEl.textContent = best;
      }
      overlayTitle.textContent = 'Game Over';
      overlayText.textContent = `You scored ${score}. ` +
        (score >= best ? 'New best! ' : '') + 'Play again?';
      startBtn.textContent = 'Play again';
      overlay.classList.remove('hidden');
    }

    function togglePause() {
      if (!running) return;
      paused = !paused;
      if (paused) {
        clearInterval(loop);
        overlayTitle.textContent = 'Paused';
        overlayText.textContent = 'Press P or Play to continue.';
        startBtn.textContent = 'Resume';
        overlay.classList.remove('hidden');
      } else {
        overlay.classList.add('hidden');
        restartLoop();
      }
    }

    function setDir(x, y) {
      // prevent reversing directly onto self
      if (x === -dir.x && y === -dir.y) return;
      nextDir = { x, y };
    }

    document.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'ArrowUp': case 'w': case 'W': setDir(0, -1); break;
        case 'ArrowDown': case 's': case 'S': setDir(0, 1); break;
        case 'ArrowLeft': case 'a': case 'A': setDir(-1, 0); break;
        case 'ArrowRight': case 'd': case 'D': setDir(1, 0); break;
        case 'p': case 'P': togglePause(); break;
      }
    });

    // touch / swipe controls
    let touchStart = null;
    canvas.addEventListener('touchstart', (e) => {
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }, { passive: true });

    canvas.addEventListener('touchmove', (e) => {
      if (!touchStart) return;
      const dx = e.touches[0].clientX - touchStart.x;
      const dy = e.touches[0].clientY - touchStart.y;
      if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
      if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
      else setDir(0, dy > 0 ? 1 : -1);
      touchStart = null;
    }, { passive: true });

    startBtn.addEventListener('click', () => {
      if (paused) togglePause();
      else start();
    });

    // initial render
    reset();
    draw();
  </script>
</body>
</html>
